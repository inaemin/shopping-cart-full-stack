name: Deploy

on:
  push:
    branches:
      - step4

permissions:
  contents: read

env:
  NODE_VERSION: 22
  GHCR_REGISTRY: ghcr.io
  SERVER_IMAGE_TAG: ${{ github.sha }}
  SERVER_DEPLOY_DIR: ${{ vars.SERVER_DEPLOY_DIR || '/home/ubuntu/shopping-cart' }}
  POSTGRES_USER: ${{ vars.POSTGRES_USER || 'shopping' }}
  POSTGRES_DB: ${{ vars.POSTGRES_DB || 'shopping_cart' }}

jobs:
  detect-changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.changed.outputs.client }}
      server: ${{ steps.changed.outputs.server }}

    steps:
      - uses: actions/checkout@v5

      - id: changed
        name: Check changed files
        uses: dorny/paths-filter@v4
        with:
          filters: |
            client:
              - 'client/**'
              - '.github/workflows/deploy.yml'
            server:
              - 'server/**'
              - '.github/workflows/deploy.yml'

  deploy-client:
    name: Deploy client to GitHub Pages
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.client == 'true'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build
        working-directory: client
        run: npm run build
        env:
          GITHUB_ACTIONS: true
          VITE_API_BASE_URL: https://${{ vars.SERVER_DOMAIN }}

      - name: Build Storybook
        working-directory: client
        run: npm run build-storybook -- --output-dir dist/storybook

      - name: Copy index.html to 404.html
        run: cp client/dist/index.html client/dist/404.html

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: client/dist

  build-server-image:
    name: Build and push server image to GHCR
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.server == 'true'
    permissions:
      contents: read
      packages: write
    outputs:
      server-image: ${{ steps.image.outputs.server-image }}

    steps:
      - uses: actions/checkout@v5

      - id: image
        name: Set server image name
        shell: bash
        run: echo "server-image=${GHCR_REGISTRY}/${GITHUB_REPOSITORY,,}-server" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: server
          file: server/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.server-image }}:${{ env.SERVER_IMAGE_TAG }}
            ${{ steps.image.outputs.server-image }}:latest

  deploy-server:
    name: Deploy server stack to VM
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - build-server-image
    if: needs.detect-changes.outputs.server == 'true'

    steps:
      - name: Deploy Caddy, Express, and PostgreSQL
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_IMAGE: ${{ needs.build-server-image.outputs.server-image }}
          SERVER_IMAGE_TAG: ${{ env.SERVER_IMAGE_TAG }}
          SERVER_DEPLOY_DIR: ${{ env.SERVER_DEPLOY_DIR }}
          SERVER_DOMAIN: ${{ vars.SERVER_DOMAIN }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT || 22 }}
          envs: GHCR_IMAGE,SERVER_IMAGE_TAG,SERVER_DEPLOY_DIR,SERVER_DOMAIN,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB
          script: |
            set -euo pipefail

            mkdir -p "$SERVER_DEPLOY_DIR"
            cd "$SERVER_DEPLOY_DIR"

            {
              printf 'SERVER_IMAGE=%s:%s\n' "$GHCR_IMAGE" "$SERVER_IMAGE_TAG"
              printf 'SERVER_DOMAIN=%s\n' "$SERVER_DOMAIN"
              printf 'POSTGRES_USER=%s\n' "$POSTGRES_USER"
              printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD"
              printf 'POSTGRES_DB=%s\n' "$POSTGRES_DB"
            } > .env

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
