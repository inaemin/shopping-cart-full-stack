services:
  postgres:
    image: postgres:16-alpine
    container_name: shopping-cart-postgres
    environment:
      POSTGRES_USER: shopping
      POSTGRES_PASSWORD: shopping
      POSTGRES_DB: shopping_cart
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "max_connections=20"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=64MB"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopping -d shopping_cart"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres-test:
    image: postgres:16-alpine
    container_name: shopping-cart-postgres-test
    environment:
      POSTGRES_USER: shopping
      POSTGRES_PASSWORD: shopping
      POSTGRES_DB: shopping_cart_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopping -d shopping_cart_test"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
